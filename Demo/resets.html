<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resets — Unfinished, After Hours</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --plum: #3B1F3A; --plum-mid: #5C3459; --plum-light: #7D4D78;
      --coral: #E8705A; --coral-hover: #D45C45;
      --cream: #FAF7F2; --warm-white: #FFF9F4;
      --muted: #9B8A9A; --text: #2C1A2B; --text-soft: #5A4559;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--warm-white); color: var(--text); min-height: 100vh; }

    nav { display: flex; align-items: center; justify-content: space-between; padding: 1.2rem 5vw; border-bottom: 1px solid rgba(59,31,58,.07); }
    .nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.15rem; font-weight: 500; color: var(--plum); text-decoration: none; }
    .nav-back { font-size: .78rem; letter-spacing: .07em; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color .2s; }
    .nav-back:hover { color: var(--plum); }

    .page-wrap { max-width: 1000px; margin: 0 auto; padding: 3.5rem 5vw 6rem; }

    .page-header { margin-bottom: 3rem; }
    .page-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(2rem, 4vw, 3rem); font-weight: 300; color: var(--plum); margin-bottom: .5rem; }
    .page-sub { font-size: .9rem; color: var(--muted); font-weight: 300; }

    /* filter tabs */
    .filter-tabs { display: flex; gap: .5rem; margin-bottom: 2.5rem; flex-wrap: wrap; }
    .tab {
      padding: .4rem 1rem; border-radius: 100px; font-size: .78rem;
      letter-spacing: .06em; text-transform: uppercase; cursor: pointer;
      border: 1.5px solid rgba(59,31,58,.14); background: transparent;
      color: var(--text-soft); font-family: 'DM Sans', sans-serif; transition: all .2s;
    }
    .tab.active { background: var(--plum); color: var(--cream); border-color: var(--plum); }
    .tab:hover:not(.active) { border-color: var(--plum-light); }

    /* grid */
    .resets-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.4rem; }

    .reset-card {
      border-radius: 14px; padding: 1.8rem 1.6rem; cursor: pointer;
      border: 1px solid rgba(59,31,58,.09); background: var(--cream);
      transition: transform .18s, box-shadow .18s;
    }
    .reset-card:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(59,31,58,.08); }
    .reset-card.featured { background: var(--plum); color: var(--cream); border-color: var(--plum); }

    .rc-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.2rem; gap: .5rem; }
    .rc-category {
      font-size: .65rem; letter-spacing: .12em; text-transform: uppercase;
      padding: .25rem .7rem; border-radius: 100px; font-weight: 500;
    }
    .rc-category.body { background: rgba(59,31,58,.07); color: var(--plum-mid); }
    .rc-category.mind { background: rgba(99,122,180,.1); color: #4A5FA0; }
    .rc-category.guilt { background: rgba(232,112,90,.1); color: var(--coral); }
    .reset-card.featured .rc-category { background: rgba(255,255,255,.15); color: rgba(250,247,242,.8); }

    .rc-time { font-size: .72rem; color: var(--muted); }
    .reset-card.featured .rc-time { color: rgba(250,247,242,.5); }

    .rc-title { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 500; color: var(--plum); line-height: 1.2; margin-bottom: .5rem; }
    .reset-card.featured .rc-title { color: rgba(250,247,242,.95); }

    .rc-desc { font-size: .83rem; line-height: 1.65; color: var(--text-soft); font-weight: 300; }
    .reset-card.featured .rc-desc { color: rgba(250,247,242,.6); }

    .rc-btn {
      display: inline-flex; align-items: center; gap: .35rem; margin-top: 1.2rem;
      font-size: .73rem; letter-spacing: .07em; text-transform: uppercase;
      color: var(--coral); font-weight: 500; background: none; border: none; cursor: pointer;
      font-family: 'DM Sans', sans-serif; transition: gap .15s;
    }
    .rc-btn:hover { gap: .55rem; }
    .reset-card.featured .rc-btn { color: rgba(232,112,90,.85); }

    /* MODAL */
    .modal-backdrop {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(43,26,43,.5); backdrop-filter: blur(6px);
      align-items: center; justify-content: center; padding: 2rem;
    }
    .modal-backdrop.open { display: flex; }

    .modal {
      background: var(--warm-white); border-radius: 20px;
      max-width: 520px; width: 100%; padding: 2.8rem 2.4rem;
      position: relative; animation: fadeUp .3s ease;
    }

    .modal-close {
      position: absolute; top: 1.2rem; right: 1.2rem;
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 1.2rem; transition: color .2s;
    }
    .modal-close:hover { color: var(--text); }

    .modal-badge { font-size: .68rem; letter-spacing: .12em; text-transform: uppercase; color: var(--coral); margin-bottom: 1rem; }
    .modal-title { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 400; color: var(--plum); margin-bottom: .6rem; line-height: 1.2; }
    .modal-desc { font-size: .9rem; color: var(--text-soft); font-weight: 300; line-height: 1.7; margin-bottom: 2rem; }

    /* steps */
    .step-list { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 2rem; }
    .step-item { display: flex; gap: 1rem; align-items: flex-start; }
    .step-num {
      width: 24px; height: 24px; border-radius: 50%; background: var(--plum);
      color: var(--cream); font-size: .72rem; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 1px; font-weight: 500;
    }
    .step-text { font-size: .9rem; color: var(--text-soft); font-weight: 300; line-height: 1.6; }

    .modal-actions { display: flex; gap: .7rem; align-items: center; }
    .btn-start {
      background: var(--coral); color: #fff; border: none; border-radius: 100px;
      font-family: 'DM Sans', sans-serif; font-size: .84rem; font-weight: 500;
      letter-spacing: .05em; text-transform: uppercase;
      padding: .8rem 1.8rem; cursor: pointer; transition: background .2s;
    }
    .btn-start:hover { background: var(--coral-hover); }
    .btn-skip-modal {
      font-size: .78rem; color: var(--muted); background: none; border: none;
      cursor: pointer; font-family: 'DM Sans', sans-serif;
    }

    /* timer view inside modal */
    .timer-view { display: none; text-align: center; }
    .timer-view.active { display: block; }
    .timer-display {
      font-family: 'Cormorant Garamond', serif; font-size: 5rem; font-weight: 300;
      color: var(--plum); letter-spacing: -.02em; margin: 1.5rem 0;
    }
    .timer-msg { font-size: .9rem; font-style: italic; color: var(--text-soft); font-weight: 300; margin-bottom: 2rem; font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; }
    .btn-end-reset {
      background: transparent; border: 1.5px solid rgba(59,31,58,.2);
      color: var(--text-soft); border-radius: 100px; padding: .65rem 1.5rem;
      font-family: 'DM Sans', sans-serif; font-size: .78rem;
      letter-spacing: .06em; text-transform: uppercase; cursor: pointer;
      transition: all .2s;
    }
    .btn-end-reset:hover { border-color: var(--plum); color: var(--plum); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 700px) { .resets-grid { grid-template-columns: 1fr; } }
  
    /* ── SIDEBAR LAYOUT ── */
    .app-layout { display: grid; grid-template-columns: 220px 1fr; min-height: 100vh; }
    aside { background: var(--plum); padding: 2rem 1.5rem; display: flex; flex-direction: column; gap: 2rem; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
    .aside-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; font-weight: 500; color: rgba(250,247,242,.85); text-decoration: none; line-height: 1.3; }
    .nav-section { display: flex; flex-direction: column; gap: .3rem; }
    .nav-section-label { font-size: .6rem; letter-spacing: .14em; text-transform: uppercase; color: rgba(250,247,242,.3); padding: .5rem .6rem .3rem; font-weight: 500; }
    .nav-link { display: flex; align-items: center; gap: .7rem; padding: .6rem .8rem; border-radius: 8px; font-size: .85rem; color: rgba(250,247,242,.6); text-decoration: none; transition: background .2s, color .2s; font-weight: 300; }
    .nav-link:hover { background: rgba(255,255,255,.08); color: rgba(250,247,242,.9); }
    .nav-link.active { background: rgba(255,255,255,.12); color: rgba(250,247,242,1); font-weight: 400; }
    .nav-link svg { opacity: .7; flex-shrink: 0; }
    .nav-link.active svg { opacity: 1; }
    .aside-bottom { margin-top: auto; }
    .profile-pill { display: flex; align-items: center; gap: .7rem; padding: .7rem .8rem; border-radius: 10px; background: rgba(255,255,255,.07); }
    .profile-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--coral); display: flex; align-items: center; justify-content: center; font-size: .75rem; font-weight: 500; color: #fff; flex-shrink: 0; }
    .profile-name { font-size: .82rem; color: rgba(250,247,242,.75); font-weight: 300; }
    .profile-tag { font-size: .68rem; color: rgba(250,247,242,.4); letter-spacing: .04em; }
    .page-main { overflow-y: auto; }
    @media (max-width: 900px) { .app-layout { grid-template-columns: 1fr; } aside { display: none; } }

  </style>
</head>
<body>
<div class="app-layout">
  <aside>
    <a class="aside-logo" href="index.html">Unfinished,<br>After Hours</a>
    <div class="nav-section">
      <div class="nav-section-label">Main</div>
      <a class="nav-link" href="dashboard.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</a>
      <a class="nav-link" href="conversation.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Have a Conversation</a>
      <a class="nav-link active" href="resets.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>Resets</a>
    </div>
    <div class="nav-section">
      <div class="nav-section-label">Tools</div>
      <a class="nav-link" href="todo.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>Soft To-Do</a>
      <a class="nav-link" href="journal.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>Journal Space</a>
      <a class="nav-link" href="letters.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>Unsent Letters</a>
    </div>
    <div class="aside-bottom">
      <div class="profile-pill">
        <div class="profile-avatar">A</div>
        <div><div class="profile-name">You</div><div class="profile-tag">The Over-Functioner</div></div>
      </div>
    </div>
  </aside>
  <div class="page-main">

<div class="page-wrap">
  <div class="page-header">
    <p style="font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--coral);font-weight:500;margin-bottom:.6rem;">Tools</p>
    <h1 class="page-title">Resets</h1>
    <p class="page-sub">2–5 minutes each. No timer guilt. Exit whenever.</p>
  </div>

  <div class="filter-tabs">
    <button class="tab active" onclick="filterResets('all', this)">All</button>
    <button class="tab" onclick="filterResets('body', this)">Body</button>
    <button class="tab" onclick="filterResets('mind', this)">Mind</button>
    <button class="tab" onclick="filterResets('guilt', this)">Guilt disruptors</button>
  </div>

  <div class="resets-grid" id="resetsGrid"></div>
</div>

<!-- MODAL -->
<div class="modal-backdrop" id="modal" onclick="closeModal(event)">
  <div class="modal" id="modalContent">
    <button class="modal-close" onclick="closeModal()">✕</button>

    <!-- intro view -->
    <div id="introView">
      <p class="modal-badge" id="m-badge"></p>
      <h2 class="modal-title" id="m-title"></h2>
      <p class="modal-desc" id="m-desc"></p>
      <div class="step-list" id="m-steps"></div>
      <div class="modal-actions">
        <button class="btn-start" onclick="startTimer()">Begin</button>
        <button class="btn-skip-modal" onclick="closeModal()">Not right now</button>
      </div>
    </div>

    <!-- timer view -->
    <div class="timer-view" id="timerView">
      <p class="modal-badge" id="t-badge">In progress</p>
      <h2 class="modal-title" id="t-title"></h2>
      <div class="timer-display" id="timerDisplay">3:00</div>
      <p class="timer-msg" id="t-msg">Nothing to fix. Just pause.</p>
      <button class="btn-end-reset" onclick="endReset()">Done for now</button>
    </div>
  </div>
</div>

<script>
  const resets = [
    {
      id: 1, featured: true, category: 'guilt', label: 'Guilt disruptor', time: '3 min',
      title: 'You Don't Need to Earn Rest',
      desc: 'For when you feel like you haven't done enough to deserve a break.',
      timerMsg: 'You are allowed to stop. Right now. No earning required.',
      steps: [
        'Put down whatever you're trying to finish.',
        'Say out loud or in your head: "I don\'t need to earn this."',
        'Breathe slowly for 3 minutes. That\'s the whole thing.'
      ]
    },
    {
      id: 2, category: 'body', label: 'Body reset', time: '2 min',
      title: 'Unclench Your Jaw',
      desc: 'You've been holding tension there for hours. Let\'s notice it.',
      timerMsg: 'Let your teeth part. Let your tongue drop. That\'s it.',
      steps: [
        'Notice your jaw right now. Are your teeth touching?',
        'Gently open your mouth, then let it close without pressing.',
        'Place your tongue loosely at the bottom of your mouth.',
        'Hold for 2 minutes. Breathe through your nose.'
      ]
    },
    {
      id: 3, category: 'mind', label: 'Mind reset', time: '4 min',
      title: 'Stare at Something Green',
      desc: 'Your brain needs a different input. This is it.',
      timerMsg: 'No analyzing. Just looking.',
      steps: [
        'Find something green — a plant, outside, an image.',
        'Look at it without trying to think about anything.',
        'If thoughts come, let them pass like clouds.',
        'Just keep looking at the green for 4 minutes.'
      ]
    },
    {
      id: 4, category: 'guilt', label: 'Guilt disruptor', time: '5 min',
      title: 'You Don't Need to Optimize This Moment',
      desc: 'For the part of you that turns every rest into a task.',
      timerMsg: 'This moment doesn\'t need to produce anything.',
      steps: [
        'Notice the urge to make this break "useful."',
        'Resist it. Deliberately.',
        'Sit, lie down, or look out a window with zero agenda.',
        'If productivity guilt shows up — just notice it. Don\'t fight it.'
      ]
    },
    {
      id: 5, category: 'body', label: 'Body reset', time: '3 min',
      title: 'Drop Your Shoulders',
      desc: 'Check in with where you're carrying everything.',
      timerMsg: 'Your shoulders don\'t need to hold all of this.',
      steps: [
        'Inhale and raise your shoulders toward your ears.',
        'Hold for 3 seconds.',
        'Exhale and let them fall completely.',
        'Repeat 5 times, slower each time.'
      ]
    },
    {
      id: 6, category: 'mind', label: 'Mind reset', time: '2 min',
      title: 'Name Five Things',
      desc: 'A simple grounding technique for when everything feels overwhelming.',
      timerMsg: 'You are here. Right now. That\'s enough.',
      steps: [
        '5 things you can see.',
        '4 things you can physically feel.',
        '3 things you can hear.',
        '2 things you can smell.',
        '1 thing you can taste.'
      ]
    }
  ];

  let currentReset = null;
  let timerInterval = null;
  let secondsLeft = 0;

  function filterResets(cat, btn) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    renderResets(cat);
  }

  function renderResets(cat = 'all') {
    const grid = document.getElementById('resetsGrid');
    const filtered = cat === 'all' ? resets : resets.filter(r => r.category === cat);
    grid.innerHTML = filtered.map(r => `
      <div class="reset-card ${r.featured ? 'featured' : ''}" onclick="openReset(${r.id})">
        <div class="rc-top">
          <span class="rc-category ${r.category}">${r.label}</span>
          <span class="rc-time">${r.time}</span>
        </div>
        <h3 class="rc-title">${r.title}</h3>
        <p class="rc-desc">${r.desc}</p>
        <button class="rc-btn">Begin → </button>
      </div>
    `).join('');
  }

  function openReset(id) {
    currentReset = resets.find(r => r.id === id);
    document.getElementById('m-badge').textContent = `${currentReset.label} · ${currentReset.time}`;
    document.getElementById('m-title').textContent = currentReset.title;
    document.getElementById('m-desc').textContent = currentReset.desc;
    document.getElementById('m-steps').innerHTML = currentReset.steps.map((s, i) => `
      <div class="step-item"><div class="step-num">${i+1}</div><p class="step-text">${s}</p></div>
    `).join('');
    document.getElementById('introView').style.display = 'block';
    document.getElementById('timerView').classList.remove('active');
    document.getElementById('modal').classList.add('open');
  }

  function startTimer() {
    const mins = parseInt(currentReset.time);
    secondsLeft = mins * 60;
    document.getElementById('t-title').textContent = currentReset.title;
    document.getElementById('t-msg').textContent = currentReset.timerMsg;
    document.getElementById('introView').style.display = 'none';
    document.getElementById('timerView').classList.add('active');
    updateTimerDisplay();
    timerInterval = setInterval(() => {
      secondsLeft--;
      updateTimerDisplay();
      if (secondsLeft <= 0) { clearInterval(timerInterval); endReset(); }
    }, 1000);
  }

  function updateTimerDisplay() {
    const m = Math.floor(secondsLeft / 60);
    const s = secondsLeft % 60;
    document.getElementById('timerDisplay').textContent = `${m}:${s.toString().padStart(2,'0')}`;
  }

  function endReset() {
    clearInterval(timerInterval);
    closeModal();
  }

  function closeModal(e) {
    if (e && e.target !== document.getElementById('modal')) return;
    clearInterval(timerInterval);
    document.getElementById('modal').classList.remove('open');
    document.getElementById('timerView').classList.remove('active');
    document.getElementById('introView').style.display = 'block';
  }

  renderResets();
</script>
  </div><!-- page-main -->
</div><!-- app-layout -->
</body>
</html>
